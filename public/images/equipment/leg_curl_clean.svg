  <rect x="315" y="130" width="40" height="120" rx="2" fill="#9CA3AF"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">腿弯举机</text>
