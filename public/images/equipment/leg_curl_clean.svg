  <!-- Back pad -->
  <rect x="100" y="80" width="200" height="130" rx="12" fill="#4B5563"/>
  <!-- Leg pad -->
  <rect x="200" y="240" width="80" height="60" rx="8" fill="#9CA3AF"/>
  <!-- Pivot arm -->
