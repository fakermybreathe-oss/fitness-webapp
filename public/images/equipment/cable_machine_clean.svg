<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Vertical frame -->
  <rect x="150" y="60" width="20" height="280" rx="4" fill="#4B5563"/>
  <rect x="230" y="60" width="20" height="280" rx="4" fill="#4B5563"/>
  <!-- Top pulley housing -->
  <rect x="140" y="60" width="120" height="40" rx="6" fill="#6B7280"/>
  <!-- Bottom pulley housing -->
  <rect x="140" y="300" width="120" height="40" rx="6" fill="#6B7280"/>
  <!-- Cable -->
  <line x1="200" y1="100" x2="200" y2="300" stroke="#9CA3AF" stroke-width="3"/>
  <!-- Weight stack -->
  <rect x="260" y="120" width="50" height="140" rx="4" fill="#E5E7EB"/>
  <rect x="265" y="140" width="40" height="100" rx="2" fill="#9CA3AF"/>
  <!-- Handle -->
  <circle cx="200" cy="180" r="20" fill="#374151"/>
  <circle cx="200" cy="180" r="12" fill="#6B7280"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">龙门架</text>
</svg>
