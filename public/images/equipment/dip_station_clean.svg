<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Base frame -->
  <rect x="100" y="300" width="200" height="15" rx="3" fill="#4B5563"/>
  <!-- Left arm -->
  <rect x="80" y="150" width="20" height="150" rx="4" fill="#6B7280"/>
  <!-- Right arm -->
  <rect x="300" y="150" width="20" height="150" rx="4" fill="#6B7280"/>
  <!-- Top bar connecting arms -->
  <rect x="80" y="145" width="240" height="15" rx="4" fill="#4B5563"/>
  <!-- Handles -->
  <rect x="70" y="170" width="40" height="12" rx="6" fill="#374151"/>
  <rect x="290" y="170" width="40" height="12" rx="6" fill="#374151"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">双杠臂屈伸架</text>
</svg>
