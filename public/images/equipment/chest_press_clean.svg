<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Seat -->
  <rect x="100" y="230" width="200" height="35" rx="8" fill="#6B7280"/>
  <!-- Back pad -->
  <rect x="80" y="100" width="240" height="140" rx="12" fill="#4B5563"/>
  <!-- Push arms -->
  <rect x="100" y="180" width="50" height="20" rx="6" fill="#9CA3AF"/>
  <rect x="250" y="180" width="50" height="20" rx="6" fill="#9CA3AF"/>
  <!-- Handles -->
  <rect x="90" y="175" width="20" height="30" rx="4" fill="#374151"/>
  <rect x="290" y="175" width="20" height="30" rx="4" fill="#374151"/>
  <!-- Weight stack -->
  <rect x="320" y="80" width="50" height="200" rx="4" fill="#E5E7EB"/>
  <rect x="325" y="110" width="40" height="160" rx="2" fill="#9CA3AF"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">坐式推胸机</text>
