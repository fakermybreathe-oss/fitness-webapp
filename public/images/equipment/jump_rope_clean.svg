  <line x1="125" y1="200" x2="135" y2="200" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="265" y1="150" x2="275" y2="150" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="265" y1="200" x2="275" y2="200" stroke="#9CA3AF" stroke-width="2"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">跳绳</text>
