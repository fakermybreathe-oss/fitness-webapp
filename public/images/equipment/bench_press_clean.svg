<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Bench -->
  <rect x="60" y="250" width="280" height="25" rx="4" fill="#9CA3AF"/>
  <rect x="60" y="275" width="280" height="10" rx="2" fill="#6B7280"/>
  <!-- Bench legs -->
  <rect x="80" y="285" width="15" height="50" rx="2" fill="#4B5563"/>
  <rect x="305" y="285" width="15" height="50" rx="2" fill="#4B5563"/>
  <!-- Barbell on bench -->
  <g transform="translate(200, 220)">
    <rect x="-120" y="-6" width="240" height="12" rx="3" fill="#374151"/>
    <!-- Weight plates -->
    <rect x="-100" y="-25" width="18" height="50" rx="2" fill="#4B5563"/>
    <rect x="82" y="-25" width="18" height="50" rx="2" fill="#4B5563"/>
  </g>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">卧推凳</text>
</svg>
