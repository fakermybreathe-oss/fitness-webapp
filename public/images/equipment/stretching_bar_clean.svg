<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Vertical frame -->
  <rect x="180" y="50" width="40" height="280" rx="4" fill="#4B5563"/>
  <!-- Top bar -->
  <rect x="100" y="60" width="200" height="15" rx="4" fill="#374151"/>
  <!-- Multiple grip positions -->
  <rect x="110" y="75" width="25" height="10" rx="3" fill="#9CA3AF"/>
  <rect x="150" y="75" width="25" height="10" rx="3" fill="#9CA3AF"/>
  <rect x="225" y="75" width="25" height="10" rx="3" fill="#9CA3AF"/>
  <rect x="265" y="75" width="25" height="10" rx="3" fill="#9CA3AF"/>
  <!-- Knee pads -->
  <rect x="160" y="260" width="80" height="40" rx="6" fill="#6B7280"/>
  <!-- Base legs -->
  <rect x="120" y="300" width="25" height="20" rx="2" fill="#4B5563"/>
  <rect x="255" y="300" width="25" height="20" rx="2" fill="#4B5563"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">拉伸架</text>
</svg>