<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Back rest -->
  <rect x="100" y="120" width="200" height="100" rx="10" fill="#6B7280"/>
  <!-- Seat -->
  <rect x="100" y="220" width="200" height="30" rx="6" fill="#9CA3AF"/>
  <!-- Foot platform -->
  <rect x="120" y="300" width="160" height="20" rx="4" fill="#4B5563"/>
  <!-- Leg press arms -->
  <rect x="90" y="150" width="15" height="120" rx="3" fill="#374151"/>
  <rect x="295" y="150" width="15" height="120" rx="3" fill="#374151"/>
  <!-- Weight stack indicator -->
  <rect x="320" y="130" width="40" height="150" rx="4" fill="#E5E7EB"/>
  <rect x="325" y="180" width="30" height="95" rx="2" fill="#9CA3AF"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">腿举机</text>
</svg>
