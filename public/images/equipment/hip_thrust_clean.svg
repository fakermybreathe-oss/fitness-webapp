<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Back support pad -->
  <rect x="80" y="100" width="80" height="100" rx="10" fill="#4B5563"/>
  <!-- Foot platform -->
  <rect x="180" y="280" width="140" height="40" rx="6" fill="#6B7280"/>
  <!-- Hip pad -->
  <rect x="150" y="180" width="120" height="30" rx="8" fill="#9CA3AF"/>
  <!-- Weight arms -->
  <rect x="240" y="160" width="15" height="120" rx="3" fill="#374151"/>
  <!-- Weight stack -->
  <rect x="320" y="80" width="50" height="200" rx="4" fill="#E5E7EB"/>
  <rect x="325" y="110" width="40" height="160" rx="2" fill="#9CA3AF"/>
  <!-- Handles -->
  <rect x="70" y="180" width="30" height="15" rx="4" fill="#374151"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">臀桥机</text>
</svg>