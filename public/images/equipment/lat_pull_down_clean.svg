<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Top frame with weight -->
  <rect x="100" y="60" width="200" height="50" rx="8" fill="#4B5563"/>
  <!-- Weight stack -->
  <rect x="270" y="80" width="60" height="180" rx="4" fill="#E5E7EB"/>
  <rect x="275" y="100" width="50" height="140" rx="2" fill="#9CA3AF"/>
  <!-- Seat -->
  <rect x="120" y="220" width="160" height="30" rx="8" fill="#6B7280"/>
  <!-- Thigh pad -->
  <rect x="130" y="180" width="140" height="35" rx="6" fill="#9CA3AF"/>
  <!-- Pulley area -->
  <circle cx="200" cy="110" r="25" fill="#374151"/>
  <circle cx="200" cy="110" r="15" fill="#6B7280"/>
  <!-- Cable -->
  <path d="M200 135 Q200 200 200 180" stroke="#4B5563" stroke-width="4" fill="none"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">高位下拉机</text>
</svg>
