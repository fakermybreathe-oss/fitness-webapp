  <path d="M100 250 Q200 300 300 250" stroke="#4B5563" stroke-width="2" fill="none"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">平衡球</text>
</svg>