  <ellipse cx="200" cy="200" rx="120" ry="120" fill="#6B7280"/>
  <!-- Ball shine -->
  <ellipse cx="160" cy="160" rx="40" ry="35" fill="#9CA3AF"/>
  <!-- Ball shadow -->
