<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Base frame -->
  <rect x="100" y="300" width="200" height="20" rx="4" fill="#374151"/>
  <!-- Back pad angled -->
  <rect x="80" y="80" width="200" height="120" rx="10" fill="#4B5563" transform="rotate(-15 180 140)"/>
  <!-- Foot platform -->
  <rect x="120" y="280" width="160" height="30" rx="6" fill="#6B7280"/>
  <!-- Shoulder pads -->
  <rect x="80" y="140" width="40" height="25" rx="6" fill="#9CA3AF"/>
  <rect x="280" y="140" width="40" height="25" rx="6" fill="#9CA3AF"/>
  <!-- Sliding track -->
  <rect x="90" y="200" width="220" height="8" rx="2" fill="#E5E7EB"/>
  <!-- Weight stack -->
  <rect x="320" y="100" width="50" height="180" rx="4" fill="#E5E7EB"/>
  <rect x="325" y="130" width="40" height="140" rx="2" fill="#9CA3AF"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">哈克深蹲机</text>
</svg>