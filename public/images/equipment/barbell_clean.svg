<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <g transform="translate(80, 200)">
    <!-- Barbell body -->
    <rect x="-120" y="-8" width="240" height="16" rx="4" fill="#374151"/>
    <!-- Left weight plates -->
    <rect x="-100" y="-35" width="20" height="70" rx="3" fill="#4B5563"/>
    <rect x="-75" y="-28" width="15" height="56" rx="3" fill="#6B7280"/>
    <!-- Right weight plates -->
    <rect x="80" y="-35" width="20" height="70" rx="3" fill="#4B5563"/>
    <rect x="60" y="-28" width="15" height="56" rx="3" fill="#6B7280"/>
    <!-- Center grip marks -->
    <rect x="-8" y="-10" width="16" height="20" rx="2" fill="#1F2937"/>
    <line x1="-4" y1="-6" x2="-4" y2="6" stroke="#374151" stroke-width="2"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#374151" stroke-width="2"/>
    <line x1="4" y1="-6" x2="4" y2="6" stroke="#374151" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">杠铃</text>
</svg>
