<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="white"/>
  <!-- Wheel outer ring -->
  <circle cx="200" cy="180" r="100" fill="#4B5563"/>
  <circle cx="200" cy="180" r="85" fill="#6B7280"/>
  <circle cx="200" cy="180" r="25" fill="#374151"/>
  <!-- Handles on both sides -->
  <rect x="95" y="170" width="30" height="20" rx="6" fill="#9CA3AF"/>
  <rect x="275" y="170" width="30" height="20" rx="6" fill="#9CA3AF"/>
  <!-- Spokes -->
  <line x1="200" y1="180" x2="200" y2="95" stroke="#E5E7EB" stroke-width="6"/>
  <line x1="200" y1="180" x2="200" y2="265" stroke="#E5E7EB" stroke-width="6"/>
  <line x1="200" y1="180" x2="115" y2="180" stroke="#E5E7EB" stroke-width="6"/>
  <line x1="200" y1="180" x2="285" y2="180" stroke="#E5E7EB" stroke-width="6"/>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">腹肌轮</text>
</svg>